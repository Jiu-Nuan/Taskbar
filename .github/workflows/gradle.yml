name: CI Check

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build
      run: ./gradlew assembleFreeDebug
    - name: Spotless Check
      run: ./gradlew spotlessCheck
    - name: Get version
      id: version
      run: echo "VERSION=$(grep VERSION_NAME dependencies.gradle | grep -o '"[0-9.]*"' | tr -d '"')" >> $GITHUB_OUTPUT
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Taskbar-v${{ steps.version.outputs.VERSION }}
        path: app/build/outputs/apk/free/debug/*.apk
