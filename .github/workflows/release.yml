name: Release

on:
  push:
    tags:
    - 'v*'

jobs:
  release:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build release APK
      run: ./gradlew assembleFreeRelease
      env:
        KSTOREFILE: ${{ secrets.KEYSTORE_PATH }}
        KSTOREPWD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEYALIAS: ${{ secrets.KEY_ALIAS }}
        KEYPWD: ${{ secrets.KEY_PASSWORD }}
    - name: Get version
      id: version
      run: echo "VERSION=$(grep -o '"[0-9.]*"' dependencies.gradle | head -1 | tr -d '"')" >> $GITHUB_OUTPUT
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Taskbar-v${{ steps.version.outputs.VERSION }}
        path: app/build/outputs/apk/free/release/*.apk
